<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 Future Predictor</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
padding:12px 25px;
background:#38bdf8;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.result{
margin-top:25px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
display:none;
}

a{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>🤖 Future Predictor</h1>

<p>Enter your dream career and see your future.</p>

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="text"
id="dream"
placeholder="Your Dream Career">

<button onclick="predictFuture()">
🚀 Predict Future
</button>

<div class="result" id="result">

<h2 id="futureTitle"></h2>

<p id="futureText"></p>

</div>

<br>

<a href="index.html">🏠 Back Home</a>

</div>

<script>

function predictFuture(){

let name=
document.getElementById("name").value;

let dream=
document.getElementById("dream").value;

let messages=[

`In 2035, ${name} becomes a famous ${dream} and inspires thousands of people.`,

`${name} works hard every day and becomes a successful ${dream}.`,

`Your future self thanks you for never giving up on becoming a ${dream}.`,

`${name} achieves great success as a ${dream} and earns many awards.`,

`The future looks bright. ${name} is known worldwide as a talented ${dream}.`

];

let randomMessage=
messages[
Math.floor(
Math.random()*messages.length
)
];

document.getElementById(
"futureTitle"
).innerHTML=
"🌟 Future Prediction Complete";

document.getElementById(
"futureText"
).innerHTML=
randomMessage;

document.getElementById(
"result"
).style.display=
"block";

}

</script>

</body>
</html>
