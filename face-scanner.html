<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 Future Face Scanner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
text-align:center;
min-height:100vh;
padding:20px;
}

h1{
margin-top:20px;
color:#38bdf8;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

video{
width:100%;
max-width:600px;
border-radius:20px;
border:3px solid #38bdf8;
margin-top:20px;
}

canvas{
display:none;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#scanner{
width:100%;
max-width:600px;
height:5px;
background:red;
margin:0 auto;
display:none;
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{
transform:translateY(0);
}
50%{
transform:translateY(300px);
}
100%{
transform:translateY(0);
}
}

#result{
display:none;
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
}

img{
max-width:250px;
border-radius:15px;
margin-top:15px;
}

a{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>🔍 Future Face Scanner</h1>

<p>Scan your face and receive a Future Me prediction.</p>

<video id="video" autoplay playsinline></video>

<div id="scanner"></div>

<canvas id="canvas"></canvas>

<br>

<button onclick="startCamera()">📷 Start Camera</button>

<button onclick="scanFace()">🚀 Scan Face</button>

<div id="result">

<h2>🤖 Future Analysis Complete</h2>

<img id="photo">

<h3 id="futureCareer"></h3>

<p id="futureMessage"></p>

</div>

<br>

<a href="index.html">🏠 Back Home</a>

</div>

<script>

const video=document.getElementById("video");

async function startCamera(){

try{

const stream=
await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject=stream;

}catch(error){

alert(
"Camera access denied or unavailable."
);

}

}

function scanFace(){

const scanner=
document.getElementById("scanner");

scanner.style.display="block";

setTimeout(()=>{

capturePhoto();

scanner.style.display="none";

generatePrediction();

},3000);

}

function capturePhoto(){

const canvas=
document.getElementById("canvas");

const context=
canvas.getContext("2d");

canvas.width=
video.videoWidth;

canvas.height=
video.videoHeight;

context.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

const image=
canvas.toDataURL("image/png");

document.getElementById("photo").src=image;

}

function generatePrediction(){

const careers=[

"👨‍💻 AI Engineer",
"🚀 Space Scientist",
"🎮 Game Developer",
"🏆 Entrepreneur",
"📚 Professor",
"🎨 Creative Designer",
"🤖 Robotics Expert",
"🌍 Tech Innovator"

];

const messages=[

"You will create amazing projects that inspire others.",

"Your future self is known for creativity and determination.",

"You will solve problems using technology.",

"You will achieve goals you once thought impossible.",

"You will become a leader in your field.",

"Your ideas will help people around the world.",

"You will continue learning and growing every year."

];

const career=
careers[
Math.floor(
Math.random()*careers.length
)
];

const message=
messages[
Math.floor(
Math.random()*messages.length
)
];

document.getElementById(
"futureCareer"
).innerHTML=
career;

document.getElementById(
"futureMessage"
).innerHTML=
message;

document.getElementById(
"result"
).style.display=
"block";

}

</script>

</body>
</html>
