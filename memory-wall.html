<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Memory Wall</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
color:#38bdf8;
}

input{
padding:12px;
width:80%;
border:none;
border-radius:10px;
margin:10px;
}

button{
padding:12px 20px;
background:#38bdf8;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.wall{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.note{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
word-wrap:break-word;
}

a{
display:inline-block;
margin-top:25px;
padding:10px 20px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>📸 Memory Wall</h1>

<p>Add memories and notes to your wall.</p>

<input
type="text"
id="memoryInput"
placeholder="Write a memory...">

<button onclick="addMemory()">
➕ Add Memory
</button>

<div class="wall" id="wall"></div>

<a href="index.html">🏠 Back Home</a>

</div>

<script>

function addMemory(){

let text=
document.getElementById(
"memoryInput"
).value;

if(text===""){
alert("Write a memory first!");
return;
}

let note=
document.createElement("div");

note.className="note";

note.innerHTML=`
<h3>🌟 Memory</h3>
<p>${text}</p>
`;

document
.getElementById("wall")
.appendChild(note);

document
.getElementById("memoryInput")
.value="";

}

</script>

</body>
</html>
